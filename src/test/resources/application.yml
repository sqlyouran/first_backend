server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wanderchina?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

  sql:
    init:
      mode: never

logging:
  file:
    name: logs/app.log

springdoc:
  api-docs:
    version: openapi_3_1

app:
  jwt:
    secret: dev-secret-key-change-in-production-min-32-chars!!
    access-token-expiry-seconds: 1800
    refresh-token-expiry-seconds: 604800
