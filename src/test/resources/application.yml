server:
  port: 8080

spring:
  ai:
    model:
      chat: none
    mcp:
      server:
        enabled: false
    dashscope:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        type:
          preferred_uuid_jdbc_type: CHAR

  sql:
    init:
      mode: never

logging:
  file:
    name: logs/app.log

springdoc:
  api-docs:
    version: openapi_3_1

app:
  jwt:
    secret: dev-secret-key-change-in-production-min-32-chars!!
    access-token-expiry-seconds: 1800
    refresh-token-expiry-seconds: 604800
  weather:
    geocoding-url: https://geocoding-api.open-meteo.com
    forecast-url: https://api.open-meteo.com
  exchange-rate:
    api-key: test-exchange-key
    base-url: https://v6.exchangerate-api.com/v6
