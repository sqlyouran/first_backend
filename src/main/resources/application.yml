server:
  port: 8080

spring:
  ai:
    mcp:
      server:
        name: wanderchina-travel-services
        version: 1.0.0
        type: SYNC
      client:
        enabled: ${MCP_CLIENT_ENABLED:false}
        stdio:
          connections:
            browser-use:
              command: npx
              args:
                - -y
                - "@playwright/mcp"
                - --headless
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:wanderchina}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=UTC&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

  sql:
    init:
      mode: always

logging:
  file:
    name: logs/app.log

springdoc:
  api-docs:
    version: openapi_3_1

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars!!}
    access-token-expiry-seconds: 1800
    refresh-token-expiry-seconds: 604800
  weather:
    geocoding-url: https://geocoding-api.open-meteo.com
    forecast-url: https://api.open-meteo.com
  exchange-rate:
    api-key: ${EXCHANGE_RATE_API_KEY:}
    base-url: https://v6.exchangerate-api.com/v6
  chroma:
    host: ${CHROMA_HOST:http://localhost}
    port: ${CHROMA_PORT:8000}
    collection-name: wanderchina-knowledge
  rag:
    enabled: true
    top-k: 5
    similarity-threshold: 0.3
    rebuild-cron: "0 0 */6 * * *"
    max-chunk-size: 800
    chunk-overlap: 100
  search:
    rrf-k: 60
    vector-top-k: 10
    keyword-top-k: 10
    suggest-top-k: 5
    similarity-threshold: 0.3
  enrichment:
    cron: "0 0 2 * * *"
    stale-days: 7
    critical-days: 30
