server:
  port: 8080

spring:
  ai:
    mcp:
      server:
        name: wanderchina-travel-services
        version: 1.0.0
        type: SYNC
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:mysql://localhost:3306/wanderchina?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

  sql:
    init:
      mode: always

logging:
  file:
    name: logs/app.log

springdoc:
  api-docs:
    version: openapi_3_1

app:
  jwt:
    secret: dev-secret-key-change-in-production-min-32-chars!!
    access-token-expiry-seconds: 1800
    refresh-token-expiry-seconds: 604800
  weather:
    geocoding-url: https://geocoding-api.open-meteo.com
    forecast-url: https://api.open-meteo.com
  exchange-rate:
    api-key: ${EXCHANGE_RATE_API_KEY:}
    base-url: https://v6.exchangerate-api.com/v6
