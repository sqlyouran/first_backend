server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:wanderchina;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  file:
    name: logs/app.log

springdoc:
  api-docs:
    version: openapi_3_1

app:
  jwt:
    secret: dev-secret-key-change-in-production-min-32-chars!!
    access-token-expiry-seconds: 1800
    refresh-token-expiry-seconds: 604800
